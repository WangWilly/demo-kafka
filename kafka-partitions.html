<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka 核心機制視覺化模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ── Icon shims using Font Awesome ─────────────────────────────────────
        const Database      = ({className='', size=16}) => <i className={`fas fa-database ${className}`}   style={{fontSize: size}} />;
        const Server        = ({className='', size=16}) => <i className={`fas fa-server ${className}`}     style={{fontSize: size}} />;
        const Users         = ({className='', size=16}) => <i className={`fas fa-users ${className}`}      style={{fontSize: size}} />;
        const Play          = ({className='', size=16}) => <i className={`fas fa-play ${className}`}       style={{fontSize: size}} />;
        const Plus          = ({className='', size=16}) => <i className={`fas fa-plus ${className}`}       style={{fontSize: size}} />;
        const Minus         = ({className='', size=16}) => <i className={`fas fa-minus ${className}`}      style={{fontSize: size}} />;
        const Info          = ({className='', size=16}) => <i className={`fas fa-info-circle ${className}`}          style={{fontSize: size}} />;
        const AlertTriangle = ({className='', size=16}) => <i className={`fas fa-exclamation-triangle ${className}`} style={{fontSize: size}} />;
        const Cpu           = ({className='', size=16}) => <i className={`fas fa-microchip ${className}`}  style={{fontSize: size}} />;

        // ── Constants ─────────────────────────────────────────────────────────
        const MAX_PARTITIONS = 4;
        const MAX_CONSUMERS_PER_GROUP = 4;
        const COLORS = ['bg-red-500','bg-blue-500','bg-green-500','bg-amber-500','bg-purple-500','bg-pink-500'];
        const generateId = () => Math.random().toString(36).substring(2, 11);

        // ── Main App ──────────────────────────────────────────────────────────
        function App() {
            const [partitions, setPartitions] = useState([
                { id: 0, messages: [] },
                { id: 1, messages: [] }
            ]);

            const [messageCounter, setMessageCounter] = useState(0);
            const [isAutoProduce, setIsAutoProduce] = useState(false);

            const [consumers, setConsumers] = useState([
                { id: 'C-A1', group: 'A', lastMessage: null },
                { id: 'C-B1', group: 'B', lastMessage: null }
            ]);

            const [groupOffsets, setGroupOffsets] = useState({
                'A': { 0: 0, 1: 0 },
                'B': { 0: 0, 1: 0 }
            });

            const [assignments, setAssignments] = useState({});
            const [logs, setLogs] = useState([]);

            const endOfLogsRef = useRef(null);

            const addLog = useCallback((msg) => {
                setLogs(prev => [...prev, { id: generateId(), time: new Date().toLocaleTimeString(), text: msg }].slice(-50));
            }, []);

            useEffect(() => {
                endOfLogsRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            // Rebalance
            useEffect(() => {
                const newAssignments = {};
                const groups = ['A', 'B'];
                groups.forEach(group => {
                    const groupConsumers = consumers.filter(c => c.group === group);
                    const partitionIds   = partitions.map(p => p.id);
                    groupConsumers.forEach(c => newAssignments[c.id] = []);
                    if (groupConsumers.length > 0) {
                        partitionIds.forEach((pid, index) => {
                            const consumerIndex   = index % groupConsumers.length;
                            const assignedConsumer = groupConsumers[consumerIndex];
                            newAssignments[assignedConsumer.id].push(pid);
                        });
                    }
                });
                setAssignments(newAssignments);
                addLog(`觸發重新平衡 (Rebalance)：${partitions.length} 個分區已重新分配給現有消費者。`);
            }, [partitions.length, consumers.length, addLog]);

            // Produce
            const produceMessage = useCallback(() => {
                const partitionIndex = messageCounter % partitions.length;
                const newMessage = {
                    id:    generateId(),
                    text:  `M${messageCounter}`,
                    color: COLORS[messageCounter % COLORS.length]
                };
                setPartitions(prev => {
                    const next = [...prev];
                    next[partitionIndex] = {
                        ...next[partitionIndex],
                        messages: [...next[partitionIndex].messages, newMessage]
                    };
                    return next;
                });
                addLog(`[生產者] 傳送 ${newMessage.text} 到分區 ${partitionIndex}`);
                setMessageCounter(prev => prev + 1);
            }, [messageCounter, partitions.length, addLog]);

            useEffect(() => {
                let interval;
                if (isAutoProduce) interval = setInterval(produceMessage, 1000);
                return () => clearInterval(interval);
            }, [isAutoProduce, produceMessage]);

            // Consume
            useEffect(() => {
                const consumeInterval = setInterval(() => {
                    setGroupOffsets(prevOffsets => {
                        const newOffsets = { ...prevOffsets };
                        let hasConsumed = false;
                        setConsumers(prevConsumers => {
                            const newConsumers = [...prevConsumers];
                            newConsumers.forEach((consumer, i) => {
                                const assignedPids = assignments[consumer.id] || [];
                                assignedPids.forEach(pid => {
                                    const partition     = partitions.find(p => p.id === pid);
                                    const currentOffset = newOffsets[consumer.group][pid] || 0;
                                    if (partition && partition.messages.length > currentOffset) {
                                        const msgToConsume = partition.messages[currentOffset];
                                        newOffsets[consumer.group][pid] = currentOffset + 1;
                                        newConsumers[i] = { ...consumer, lastMessage: { ...msgToConsume, partition: pid } };
                                        hasConsumed = true;
                                        addLog(`[${consumer.id}] 從分區 ${pid} 讀取了 ${msgToConsume.text} (Offset: ${currentOffset})`);
                                    }
                                });
                            });
                            return newConsumers;
                        });
                        return hasConsumed ? newOffsets : prevOffsets;
                    });
                }, 1500);
                return () => clearInterval(consumeInterval);
            }, [partitions, assignments, addLog]);

            // Handlers
            const addPartition = () => {
                if (partitions.length < MAX_PARTITIONS) {
                    const newPid = partitions.length;
                    setPartitions(prev => [...prev, { id: newPid, messages: [] }]);
                    setGroupOffsets(prev => ({
                        'A': { ...prev['A'], [newPid]: 0 },
                        'B': { ...prev['B'], [newPid]: 0 }
                    }));
                }
            };

            const removePartition = () => {
                if (partitions.length > 1) setPartitions(prev => prev.slice(0, -1));
            };

            const addConsumer = (group) => {
                const groupConsumers = consumers.filter(c => c.group === group);
                if (groupConsumers.length < MAX_CONSUMERS_PER_GROUP) {
                    setConsumers(prev => [...prev, { id: `C-${group}${groupConsumers.length + 1}`, group, lastMessage: null }]);
                }
            };

            const removeConsumer = (group) => {
                const groupConsumers = consumers.filter(c => c.group === group);
                if (groupConsumers.length > 0) {
                    const lastConsumerId = groupConsumers[groupConsumers.length - 1].id;
                    setConsumers(prev => prev.filter(c => c.id !== lastConsumerId));
                }
            };

            // Insight banner
            const getInsight = () => {
                const groupA = consumers.filter(c => c.group === 'A').length;
                if (groupA > partitions.length) {
                    return { type: 'warning', text: '⚠️ 發現閒置消費者：群組 A 的消費者數量大於分區數量。為保證順序性，一個分區只能由同一個群組內的一個消費者讀取，因此多出來的消費者將無法處理任何資料。' };
                }
                if (consumers.length > 0 && consumers.filter(c => c.group === 'B').length > 0) {
                    return { type: 'info', text: '💡 發布/訂閱模式 (Pub/Sub)：群組 A 和群組 B 都有獨立的 Offset。送到 Topic 的每一筆訊息，都會被兩個群組各自消費一次，互不影響。' };
                }
                return { type: 'success', text: '✅ 運作正常：生產者將訊息均勻寫入分區，消費者根據分配到的分區進行平行處理。' };
            };

            const insight = getInsight();

            return (
                <div className="min-h-screen bg-slate-100 text-slate-800 p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto space-y-6">

                        {/* Header */}
                        <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h1 className="text-3xl font-bold flex items-center gap-3 text-slate-800">
                                <Server className="text-indigo-600" size={32} />
                                &nbsp;Kafka 核心機制視覺化模擬器
                            </h1>
                            <p className="text-slate-500 mt-2 text-lg">
                                即時觀察 Topic、Partition、Consumer Group 以及 Offset 的運作方式。
                            </p>
                            <a href="index.html" className="inline-block mt-3 text-sm text-indigo-600 hover:underline">
                                ← 返回首頁
                            </a>
                        </header>

                        {/* Insight Banner */}
                        <div className={`p-4 rounded-xl border flex gap-4 items-start shadow-sm transition-colors duration-300 ${
                            insight.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                            insight.type === 'info'    ? 'bg-blue-50 border-blue-200 text-blue-800' :
                            'bg-emerald-50 border-emerald-200 text-emerald-800'
                        }`}>
                            {insight.type === 'warning'
                                ? <AlertTriangle className="mt-0.5 shrink-0" size={24} />
                                : <Info className="mt-0.5 shrink-0" size={24} />}
                            <p className="font-medium leading-relaxed text-sm md:text-base">{insight.text}</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">

                            {/* Left Column: Producer & Config */}
                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="font-bold text-lg mb-5 flex items-center gap-2 border-b pb-3 text-slate-700">
                                        <Database className="text-blue-500" size={20} />&nbsp;生產者 (Producer)
                                    </h2>
                                    <button
                                        onClick={produceMessage}
                                        className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors font-semibold mb-3 flex items-center justify-center gap-2 shadow-sm active:scale-95"
                                    >
                                        <Plus size={18} />&nbsp;發送單筆訊息
                                    </button>
                                    <button
                                        onClick={() => setIsAutoProduce(!isAutoProduce)}
                                        className={`w-full py-2.5 ${isAutoProduce ? 'bg-red-50 text-red-600 hover:bg-red-100 border-red-200 border' : 'bg-slate-50 text-slate-700 hover:bg-slate-100 border-slate-200 border'} rounded-xl transition-colors font-semibold flex items-center justify-center gap-2 shadow-sm active:scale-95`}
                                    >
                                        {isAutoProduce ? '停止自動發送' : <><Play size={18} />&nbsp;自動發送訊息</>}
                                    </button>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="font-bold text-lg mb-5 border-b pb-3 text-slate-700">架構設定</h2>

                                    <div className="mb-5">
                                        <label className="text-sm font-medium text-slate-600 mb-2 flex justify-between items-center">
                                            <span>分區數量 (Partitions)</span>
                                            <span className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs">{partitions.length}</span>
                                        </label>
                                        <div className="flex gap-2">
                                            <button onClick={removePartition} disabled={partitions.length <= 1} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 disabled:opacity-50 transition-colors flex justify-center"><Minus size={18} className="text-slate-600" /></button>
                                            <button onClick={addPartition}    disabled={partitions.length >= MAX_PARTITIONS} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 disabled:opacity-50 transition-colors flex justify-center"><Plus  size={18} className="text-slate-600" /></button>
                                        </div>
                                    </div>

                                    <div className="mb-5">
                                        <label className="text-sm font-medium text-slate-600 mb-2 flex justify-between items-center">
                                            <span>群組 A 消費者</span>
                                            <span className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded text-xs">{consumers.filter(c => c.group === 'A').length}</span>
                                        </label>
                                        <div className="flex gap-2">
                                            <button onClick={() => removeConsumer('A')} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors flex justify-center"><Minus size={18} className="text-slate-600" /></button>
                                            <button onClick={() => addConsumer('A')}    disabled={consumers.filter(c => c.group === 'A').length >= MAX_CONSUMERS_PER_GROUP} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 disabled:opacity-50 transition-colors flex justify-center"><Plus size={18} className="text-slate-600" /></button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-sm font-medium text-slate-600 mb-2 flex justify-between items-center">
                                            <span>群組 B 消費者</span>
                                            <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs">{consumers.filter(c => c.group === 'B').length}</span>
                                        </label>
                                        <div className="flex gap-2">
                                            <button onClick={() => removeConsumer('B')} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors flex justify-center"><Minus size={18} className="text-slate-600" /></button>
                                            <button onClick={() => addConsumer('B')}    disabled={consumers.filter(c => c.group === 'B').length >= MAX_CONSUMERS_PER_GROUP} className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 disabled:opacity-50 transition-colors flex justify-center"><Plus size={18} className="text-slate-600" /></button>
                                        </div>
                                    </div>
                                </div>

                                {/* Logs Terminal */}
                                <div className="bg-slate-900 text-green-400 p-4 rounded-2xl text-xs font-mono h-48 overflow-hidden relative shadow-inner flex flex-col">
                                    <div className="text-slate-400 border-b border-slate-700 pb-2 mb-2 font-semibold flex justify-between">
                                        <span>系統日誌 Terminal</span>
                                        <span className="text-[10px] opacity-50">Kafka Broker</span>
                                    </div>
                                    <div className="overflow-y-auto flex-1 flex flex-col gap-1 pr-2 custom-scrollbar">
                                        {logs.map((log) => (
                                            <div key={log.id} className="opacity-90 break-all">
                                                <span className="text-slate-500 mr-2">[{log.time}]</span>{log.text}
                                            </div>
                                        ))}
                                        <div ref={endOfLogsRef} />
                                    </div>
                                </div>
                            </div>

                            {/* Middle Column: Broker / Partitions */}
                            <div className="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                                <h2 className="font-bold text-lg mb-5 flex items-center gap-2 border-b pb-3 text-slate-700">
                                    <Database className="text-indigo-500" size={20} />&nbsp;Broker: 主題 (Topic)
                                </h2>
                                <div className="flex-1 flex flex-col gap-4">
                                    {partitions.map((partition) => (
                                        <div key={partition.id} className="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col relative shadow-sm">
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm font-bold text-slate-600 bg-white px-2 py-1 rounded border border-slate-200">
                                                    分區 (Partition) {partition.id}
                                                </span>
                                                <span className="text-xs text-slate-400 font-mono">
                                                    Total Msgs: {partition.messages.length}
                                                </span>
                                            </div>

                                            {/* Message Queue */}
                                            <div className="bg-white rounded border border-slate-200 h-16 flex items-center p-2 overflow-hidden relative shadow-inner">
                                                {partition.messages.length === 0 ? (
                                                    <span className="text-slate-400 text-xs italic w-full text-center">等待訊息寫入...</span>
                                                ) : (
                                                    <div className="flex gap-1.5 items-center justify-end w-full">
                                                        {(() => {
                                                            const startIndex = Math.max(0, partition.messages.length - 12);
                                                            return partition.messages.slice(-12).map((msg, idx) => (
                                                                <div
                                                                    key={msg.id}
                                                                    className={`${msg.color} text-white text-xs font-bold px-2 py-1.5 rounded shadow-sm flex-shrink-0 animate-slide-in border border-black/10`}
                                                                    title={`Offset: ${startIndex + idx}`}
                                                                >
                                                                    {msg.text}
                                                                </div>
                                                            ));
                                                        })()}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Group Offsets Indicators */}
                                            <div className="flex justify-between mt-3 text-xs font-medium">
                                                <span className="bg-emerald-100 text-emerald-800 px-2 py-1 rounded flex items-center gap-1 border border-emerald-200">
                                                    <Cpu size={12} />&nbsp;Grp A Offset: {groupOffsets['A'][partition.id] || 0}
                                                </span>
                                                <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded flex items-center gap-1 border border-blue-200">
                                                    <Cpu size={12} />&nbsp;Grp B Offset: {groupOffsets['B'][partition.id] || 0}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Right Column: Consumer Groups */}
                            <div className="lg:col-span-4 flex flex-col gap-6">

                                {/* Group A */}
                                <div className="bg-emerald-50/50 p-6 rounded-2xl border border-emerald-200 flex-1 shadow-sm">
                                    <h2 className="font-bold text-emerald-800 text-lg mb-5 flex items-center gap-2 border-b border-emerald-200 pb-3">
                                        <Users size={20} />&nbsp;消費者群組 A
                                    </h2>
                                    <div className="space-y-3">
                                        {consumers.filter(c => c.group === 'A').length === 0 && (
                                            <div className="text-sm text-emerald-600/60 italic text-center py-4 bg-white/50 rounded-xl border border-emerald-100">尚無消費者</div>
                                        )}
                                        {consumers.filter(c => c.group === 'A').map(consumer => {
                                            const assigned = assignments[consumer.id] || [];
                                            const isIdle   = assigned.length === 0;
                                            return (
                                                <div key={consumer.id} className={`bg-white p-4 rounded-xl border ${isIdle ? 'border-amber-200 bg-amber-50/30' : 'border-emerald-200'} shadow-sm relative overflow-hidden transition-all duration-300`}>
                                                    <div className="flex justify-between items-start mb-3">
                                                        <span className="font-bold text-slate-700 flex items-center gap-2">
                                                            <div className={`w-2 h-2 rounded-full ${isIdle ? 'bg-amber-400 animate-pulse' : 'bg-emerald-500'}`} />
                                                            {consumer.id}
                                                        </span>
                                                        {isIdle
                                                            ? <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold uppercase tracking-wider border border-amber-200">閒置中</span>
                                                            : <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold uppercase tracking-wider border border-emerald-200">分區: {assigned.join(', ')}</span>}
                                                    </div>
                                                    <div className="text-sm text-slate-500 h-8 flex items-center bg-slate-50 rounded px-3 border border-slate-100">
                                                        {!isIdle && consumer.lastMessage ? (
                                                            <div className="flex items-center gap-2 w-full">
                                                                <span className="text-xs">處理:</span>
                                                                <span className={`${consumer.lastMessage.color} text-white px-2 py-0.5 text-xs font-bold rounded shadow-sm`}>{consumer.lastMessage.text}</span>
                                                                <span className="text-xs text-slate-400 ml-auto">來自 P{consumer.lastMessage.partition}</span>
                                                            </div>
                                                        ) : (
                                                            <span className="text-xs italic text-slate-400">{isIdle ? '無分配分區，無法處理' : '等待新訊息...'}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Group B */}
                                <div className="bg-blue-50/50 p-6 rounded-2xl border border-blue-200 flex-1 shadow-sm">
                                    <h2 className="font-bold text-blue-800 text-lg mb-5 flex items-center gap-2 border-b border-blue-200 pb-3">
                                        <Users size={20} />&nbsp;消費者群組 B
                                    </h2>
                                    <div className="space-y-3">
                                        {consumers.filter(c => c.group === 'B').length === 0 && (
                                            <div className="text-sm text-blue-600/60 italic text-center py-4 bg-white/50 rounded-xl border border-blue-100">尚無消費者</div>
                                        )}
                                        {consumers.filter(c => c.group === 'B').map(consumer => {
                                            const assigned = assignments[consumer.id] || [];
                                            const isIdle   = assigned.length === 0;
                                            return (
                                                <div key={consumer.id} className={`bg-white p-4 rounded-xl border ${isIdle ? 'border-amber-200 bg-amber-50/30' : 'border-blue-200'} shadow-sm relative overflow-hidden transition-all duration-300`}>
                                                    <div className="flex justify-between items-start mb-3">
                                                        <span className="font-bold text-slate-700 flex items-center gap-2">
                                                            <div className={`w-2 h-2 rounded-full ${isIdle ? 'bg-amber-400 animate-pulse' : 'bg-blue-500'}`} />
                                                            {consumer.id}
                                                        </span>
                                                        {isIdle
                                                            ? <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold uppercase tracking-wider border border-amber-200">閒置中</span>
                                                            : <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold uppercase tracking-wider border border-blue-200">分區: {assigned.join(', ')}</span>}
                                                    </div>
                                                    <div className="text-sm text-slate-500 h-8 flex items-center bg-slate-50 rounded px-3 border border-slate-100">
                                                        {!isIdle && consumer.lastMessage ? (
                                                            <div className="flex items-center gap-2 w-full">
                                                                <span className="text-xs">處理:</span>
                                                                <span className={`${consumer.lastMessage.color} text-white px-2 py-0.5 text-xs font-bold rounded shadow-sm`}>{consumer.lastMessage.text}</span>
                                                                <span className="text-xs text-slate-400 ml-auto">來自 P{consumer.lastMessage.partition}</span>
                                                            </div>
                                                        ) : (
                                                            <span className="text-xs italic text-slate-400">{isIdle ? '無分配分區，無法處理' : '等待新訊息...'}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
